<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MamaAlert — Register</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0B1A2E; --bg-raised:#14243F; --paper:#F5F0E6; --amber:#D9A441; --sage:#8FA89B; --line:#24406B; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--paper); font-family:'Inter',sans-serif; min-height:100vh; }
  .topbar { padding:24px 40px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; }
  .brand { font-size:20px; font-weight:700; }
  .brand span { color:var(--amber); }
  nav a { color:var(--sage); text-decoration:none; font-size:13px; margin-left:22px; font-family:'IBM Plex Mono',monospace; }
  nav a.active { color:var(--amber); }
  .content { max-width:560px; margin:0 auto; padding:50px 40px; }
  h1 { font-size:22px; margin-bottom:24px; }
  label { display:block; font-size:11.5px; color:var(--sage); font-family:'IBM Plex Mono',monospace; margin-bottom:5px; margin-top:16px; }
  input, select { width:100%; font-family:'Inter',sans-serif; font-size:14px; padding:10px 12px; border-radius:4px; border:1px solid var(--line); background:var(--bg-raised); color:var(--paper); }
  button { margin-top:26px; background:#2C5282; color:#fff; border:none; padding:12px 20px; border-radius:4px; font-weight:600; cursor:pointer; font-size:14px; }
  button:hover { background:#2A4A75; }
  .msg { margin-top:16px; font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:var(--amber); }
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand">Mama<span>Alert</span></div>
    <nav>
      <a href="/">Home</a>
      <a href="/facilities.html">Facilities</a>
      <a class="active" href="/register.html">Register</a>
      <a href="/monitoring.html">Monitoring</a>
    </nav>
  </div>
  <div class="content">
    <h1>Register a Mother</h1>
    <label>Full name</label>
    <input type="text" id="reg-name">
    <label>Phone number</label>
    <input type="tel" id="reg-phone" placeholder="+234...">
    <label>Gestational age (weeks)</label>
    <input type="number" id="reg-age">
    <label>Preferred language</label>
    <select id="reg-language">
      <option value="english">English</option>
      <option value="yoruba">Yoruba</option>
      <option value="igbo">Igbo</option>
      <option value="hausa">Hausa</option>
    </select>
    <label>Facility</label>
    <select id="reg-facility"></select>
    <button id="register-btn">Register Mother</button>
    <div class="msg" id="msg"></div>
  </div>

<script>
  async function loadFacilities() {
    const facilities = await fetch('/api/facilities').then(r => r.json());
    document.getElementById('reg-facility').innerHTML = facilities.map(f => `<option value="${f.id}">${f.name}</option>`).join('');
  }

  document.getElementById('register-btn').addEventListener('click', async () => {
    const name = document.getElementById('reg-name').value.trim();
    const phone = document.getElementById('reg-phone').value.trim();
    const gestational_age = document.getElementById('reg-age').value;
    const language = document.getElementById('reg-language').value;
    const facility_id = document.getElementById('reg-facility').value;
    const msg = document.getElementById('msg');

    if (!name || !phone || !gestational_age || !facility_id) { msg.textContent = 'Please fill in all fields.'; return; }

    const res = await fetch('/api/mothers', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ name, phone, gestational_age, language, facility_id }) });
    const data = await res.json();
    if (res.ok) {
      msg.textContent = `Registered ${name}. She will be included in this facility's next call round.`;
      document.getElementById('reg-name').value = '';
      document.getElementById('reg-phone').value = '';
      document.getElementById('reg-age').value = '';
    } else {
      msg.textContent = data.error;
    }
  });

  loadFacilities();
</script>
</body>
</html>
